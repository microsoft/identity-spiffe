agent {
    data_dir = "/opt/spire/data/agent"
    log_level = "DEBUG"
    trust_domain = "aim.microsoft.com"
    server_address = "SPIRE_SERVER_ADDR_PLACEHOLDER"
    server_port = "8081"
    socket_path = "/opt/spire/sockets/workload.sock"

    # SECURITY: Use the pre-provisioned trust bundle to verify the SPIRE
    # server's identity during bootstrap. This prevents MITM attacks where an
    # attacker impersonates the SPIRE server and issues fraudulent SVIDs.
    #
    # The trust bundle is extracted from the SPIRE server after startup
    # (deploy.sh Step 4.5) and injected as the SPIRE_TRUST_BUNDLE env var.
    # entrypoint.sh writes it to this path before the agent starts.
    #
    # If trust_bundle_path is missing at agent startup, the agent will fail
    # with a clear error rather than silently accepting an unverified server.
    #
    # Production hardening follow-up:
    #   1. Store the trust bundle in Azure Key Vault
    #   2. Mount it via Container Apps secret volume
    #   3. Rotate via Key Vault + SPIRE bundle rotation API
    trust_bundle_path = "/opt/spire/conf/trust-bundle.pem"
}

plugins {
    NodeAttestor "join_token" {
        plugin_data {}
    }

    WorkloadAttestor "unix" {
        plugin_data {
            discover_workload_path = true
        }
    }

    KeyManager "disk" {
        plugin_data {
            directory = "/opt/spire/data/agent"
        }
    }
}
